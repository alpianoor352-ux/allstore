<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran Berhasil - ALL STORE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:#111;
border:1px solid #00aeff;
border-radius:20px;
padding:35px;
max-width:420px;
width:100%;
text-align:center;
box-shadow:0 0 25px rgba(0,174,255,.35);
animation:muncul .5s;
}

@keyframes muncul{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

.icon{
font-size:80px;
margin-bottom:15px;
}

h1{
color:#00ff88;
margin-bottom:15px;
}

p{
color:#ddd;
line-height:1.7;
margin-bottom:12px;
}

.info{
background:#1b1b1b;
border-left:4px solid #00aeff;
padding:15px;
border-radius:10px;
margin:20px 0;
color:#bbb;
font-size:15px;
}

a{
display:block;
width:100%;
padding:15px;
margin-top:15px;
background:#00aeff;
color:#fff;
text-decoration:none;
font-weight:bold;
border-radius:10px;
transition:.3s;
}

a:hover{
background:#0093d9;
box-shadow:0 0 15px #00aeff;
}

.admin{
background:#25D366;
}

.admin:hover{
background:#1ebc59;
box-shadow:0 0 15px #25D366;
}

.footer{
margin-top:20px;
color:#777;
font-size:13px;
}
</style>

</head>

<body>

<div class="card">

<div class="icon">✅</div>

<h1>Pembayaran Berhasil</h1>

<p>
Terima kasih telah berbelanja di <b>ALL STORE</b>.
</p>

<div class="info">
Pembayaran berhasil diterima.<br><br>
Pesanan Anda sedang diproses secara otomatis.<br>
Mohon tunggu beberapa saat.
</div>

</a>

</a>

<div class="footer">
© 2026 ALL STORE - Digital Marketplace
</div>

</div>

</body>
</html>
